  <div class="header">
    <div class="container-fluid">
      <h1>Stats</h1>
    </div>
  </div>
  <div class="wrapper">
  <button mat-button class="btn btn-primary cyan-color" (click)="toggleChartType()">{{isLineChart ? "Map View" : "Graph View"}}</button>
  
  <form class="form" [formGroup]="typeForm">
    <select class="select btn cyan-color" formControlName="type">
      <option class="select-option" *ngFor="let item of selectorList;  let i=index"  value="{{i}}">
        {{item}}
      </option>
    </select>
  </form>
  
  <div class="margin-content" *ngIf="dataLoaded;">
    <div class="margin-content" *ngIf="isLineChart; else elseMap">
      <app-line-visualization 
        [selectedList]="selectedListNumber"
        [scansCount]="scansCount" 
        [scansWithoutAuth]="scansWithoutAuth"
        [productsCount]="productsCount"
      ></app-line-visualization>
    </div>
  </div>

</div>
<div class="info-card">
  <p class="title">SCANS</p>
  <div class="item">
    <p class="item-text">Total</p>
    <round-progress class="align-right" [color]="'#296d98'" [background]="'#909090'" [current]="100" [max]="100" [radius]="17" [stroke]="4.5"></round-progress>
    <span class="align-right progress-text item-text">{{totalScans}}</span>
  </div>
  <div class="item">
    <p class="item-text">Registered</p>
    <round-progress class="align-right" [color]="'#296d98'" [background]="'#909090'" [current]="registeredPercent" [max]="100" [radius]="17" [stroke]="4.5"></round-progress>
    <span class="align-right progress-text item-text">{{registeredScans}}</span>
  </div>
  <div class="item">
    <p class="item-text">Products</p>
    <round-progress class="align-right" [color]="'#296d98'" [background]="'#909090'" [current]="productsPercent" [max]="100" [radius]="17" [stroke]="4.5"></round-progress>
    <span class="align-right progress-text item-text">{{productScans}}</span>
  </div>
</div>

<ng-template #elseMap>
  <stats-map-visualization
  [selectedList]="selectedListNumber"
  [scansCount]="locScansCount" 
  [scansWithoutAuth]="locScansWithoutAuth"
  [productsCount]="locProductsCount"
  ></stats-map-visualization
></ng-template>
