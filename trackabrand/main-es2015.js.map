<mat-toolbar class="header">
  <div class="logo-wrapper">
    <button mat-icon-button (click)="sidenav.toggle()" class="toggle-btn">
      <mat-icon>menu_open</mat-icon>
    </button>
    <a routerLink="/">
      <img src="assets/images/logo.svg" alt="logo" class="img-fluid logo" />
    </a>
  </div>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="container">
      <div class="nav-list">
        <ul>
          <li *ngIf="isGlobalAdmin">
            <a
              routerLink="/admin-users/list"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              Admin Users
            </a>
          </li>
          <li>
            <a
              routerLink="/brands"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              Brands
            </a>
          </li>
          <li>
            <a
              routerLink="/admin-profile"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              Admin Profile
            </a>
          </li>
          <li *ngIf="isGlobalAdmin">
            <a
              routerLink="/system-settings"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              System Settings
            </a>
          </li>
          <li>
            <a
              routerLink="/stats"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              Stats
            </a>
          </li>
          <li>
            <a [routerLink]="" class="logout" (click)="logOut()">Log Out</a>
          </li>
        </ul>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <main>
      <div class="container-fluid">
        <router-outlet></router-outlet>
      </div>
    </main>
    <div class="footer">
      <div class="container-fluid">
        <p>
          © {{ currentYear }} -
          <a href="https://www.trackabrand.com/" target="_blank"
            >trackabrand.com</a
          >
        </p>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
