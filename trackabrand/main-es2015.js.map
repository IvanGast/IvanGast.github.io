<div class="header">
  <div class="container-fluid">
    <h1>Brands</h1>
    <button mat-flat-button color="accent" (click)="addBrand()">Add new brand</button>
  </div>
</div>
<div class="wrapper">
  <!-- <div class="search-input">
    <mat-form-field appearance="outline">
      <mat-label>Search brand</mat-label>
      <input
        matInput
        (keyup)="searchBrand()"
        matInput
        type="text"
        [(ngModel)]="searchString"
      />
    </mat-form-field>
  </div> -->
  <div class="container-fluid">
    <table mat-table [dataSource]="dataSource">
      <!-- Position Column -->
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>No.</th>

        <td mat-cell *matCellDef="let element; index as position">
          {{
            pageEvent
              ? position + pageEvent.pageSize * pageEvent.pageIndex + 1
              : position + 1
          }}
        </td>
      </ng-container>

      <!-- Brand name Column -->
      <ng-container matColumnDef="brandname">
        <th mat-header-cell *matHeaderCellDef>Brand name</th>
        <td mat-cell *matCellDef="let element">
          <a [routerLink]="element.id">
            {{ element.name }}
          </a>
        </td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="accent" aria-label="Edit" (click)="editBrand(element)">
            <mat-icon>create</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator
      [pageSize]="10"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="pageEvent = $event"
    ></mat-paginator>
  </div>
</div>
