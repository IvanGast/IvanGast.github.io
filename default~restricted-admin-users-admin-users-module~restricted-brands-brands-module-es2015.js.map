<h1 mat-dialog-title>ADD NEW USER</h1>
<form [formGroup]="addUserForm" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="outline">
    <mat-label>User name</mat-label>
    <input matInput formControlName="name" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>E-mail</mat-label>
    <input matInput formControlName="email" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Phone Number</mat-label>
    <input matInput formControlName="phone" />
  </mat-form-field>

  <div>
    <mat-label>User Rights</mat-label>
    <mat-radio-group formControlName="isEditUser">
      <mat-radio-button [value]="false">Read</mat-radio-button>
      <mat-radio-button [value]="true">Edit</mat-radio-button>
    </mat-radio-group>
  </div>

  <button mat-flat-button color="accent" class="submit-btn">
    {{ user == undefined ? "ADD USER" : "SAVE" }}
  </button>
</form>
