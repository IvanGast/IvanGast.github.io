<form>
  <h1>REMOVE USER</h1>
  <p>
    Are you sure you want to remove user: <b>{{ user.name }}</b> ?
  </p>
  <div class="button-group">
    <button mat-flat-button color="accent" (click)="deleteUser()">Yes</button>
    <button mat-stroked-button color="accent" (click)="closeDialog()">
      No
    </button>
  </div>
</form>
