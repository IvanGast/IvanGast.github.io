name: myapp
description: A demo Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  build_runner: ^2.4.6
  flutter_layout_grid: ^1.0.3
  cached_network_image: ^3.2.0
  flutter_screenutil: ^5.5.4
  flutter_bloc: ^8.1.1
  flutter_loggy: ^2.0.1
  get_it: ^7.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^0.13.5
  intl: ^0.18.0
  localization: ^2.1.0
  loggy: ^2.0.1+1
  navigation_history_observer: ^1.1.0
  path_provider: ^2.0.11
  provider: ^6.0.3
  shared_preferences: ^2.0.15
  url_launcher: ^6.1.6
  equatable: ^2.0.5
  sentry_flutter: ^6.11.1
  shimmer: ^3.0.0
  hive_generator: ^2.0.0
  cupertino_icons: ^1.0.2

assets:
  # assets
  - assets/
  # images
  - assets/images/
  # videos
  - assets/videos/

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  mockito: ^5.3.0
  flutter_launcher_icons: ^0.11.0

flutter:

  uses-material-design: true

  fonts:
    - family: Overpass
      fonts:
        - asset: fonts/Overpass-Regular.ttf
        - asset: fonts/Overpass-ExtraBold.ttf
          weight: 800
    - family: Tomorrow
      fonts:
        - asset: fonts/Tomorrow-Bold.ttf
          weight: 700

flutter_intl:
  enabled: true
  main_locale: en_GB