<div class="header">
  <div class="container-fluid">
    <h1>Admin Users</h1>
    <button mat-flat-button color="accent" (click)="openDialog()">
      Add new user
    </button>
  </div>
</div>
<div class="wrapper">
  <div class="search-input">
    <!-- <form> -->
    <mat-form-field appearance="outline">
      <mat-label>Search</mat-label>

      <input
        (keyup)="searchUser()"
        matInput
        type="text"
        [(ngModel)]="searchString"
      />
    </mat-form-field>
    <!-- </form> -->
  </div>

  <div class="container-fluid">
    <table mat-table [dataSource]="dataSource">
      <!-- Position Column -->
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>No.</th>
        <td mat-cell *matCellDef="let user; index as position">
          {{
            pageEvent
              ? position + pageEvent.pageSize * pageEvent.pageIndex + 1
              : position + 1
          }}
          <!-- {{ pageEvent ? pageEvent.pageIndex : position + 1 }} -->
        </td>
      </ng-container>

      <!-- Username Column -->
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Username</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user">
          <!-- Edit Button -->
          <button
            mat-icon-button
            color="accent"
            aria-label="Edit"
            matTooltip="Edit"
            (click)="openDialog(user)"
          >
            <mat-icon>create</mat-icon>
          </button>
          <!-- Disable Button -->
          <!-- <button
            mat-icon-button
            color="primary"
            aria-label="Disable"
            matTooltip="Disable"
          >
            <mat-icon>not_interested</mat-icon>
          </button> -->
          <!-- Delete Button -->
          <button
            mat-icon-button
            color="warn"
            aria-label="Delete"
            matTooltip="Delete"
            (click)="openDeleteUserDialog(user)"
          >
            <mat-icon>remove_circle_outline</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      *ngIf="!isLoading"
      [pageSize]="10"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="pageEvent = $event"
    >
    </mat-paginator>
    <div *ngIf="isLoading">
      <div class="loading">
        <app-spinner></app-spinner>
        <div class="bar"></div>
      </div>
      <mat-divider></mat-divider>
      <div class="loading">
        <app-spinner></app-spinner>
        <div class="bar"></div>
      </div>
      <mat-divider></mat-divider>
      <div class="loading">
        <app-spinner></app-spinner>
        <div class="bar"></div>
      </div>
      <mat-divider></mat-divider>
    </div>
  </div>
</div>
